name: link_cleaner
description: Clean those filthy links
publish_to: none
version: 1.0.0+2
environment:
  sdk: '>=3.0.0-322.0.dev <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  share_plus: 11.0.0
  receive_sharing_intent: 1.8.1
  flutter_riverpod: 2.6.1
  shared_preferences: 2.5.3
  equatable: 2.0.7
  intl: 0.20.2
  cupertino_icons: 1.0.8
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: 0.13.1
  flutter_lints: 2.0.0
flutter_launcher_icons:
  android: launcher_icon
  ios: false
  image_path: assets/icon/icon.png
  min_sdk_android: 21
  web:
    generate: false
    image_path: path/to/image.png
    background_color: '#hexcode'
    theme_color: '#hexcode'
  windows:
    generate: false
    image_path: path/to/image.png
    icon_size: 48
  macos:
    generate: false
    image_path: path/to/image.png
flutter:
  uses-material-design: true
